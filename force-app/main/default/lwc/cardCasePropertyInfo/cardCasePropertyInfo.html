<template>
    <lightning-card title="Proprietário" icon-name="standard:account">
        <template if:true={hasAccount}>
            <div class="slds-p-around_medium slds-grid slds-grid_vertical-align-center">
                <template if:true={account.Owner}>
                    <div class="slds-m-right_medium">
                        <img src={account.Owner.SmallPhotoUrl} alt="Foto do dono da conta" class="foto" />
                    </div>
                </template>

                <div class="slds-grid slds-grid_vertical slds-wrap">
                    <div class="slds-text-heading_small">
                        <span class="slds-text-link" onclick={openAccountTab}>
                            {account.Name}
                        </span>
                    </div>
                    <div class="slds-text-body_small slds-text-color_weak">
                        {account.Type}
                    </div>
                    <div class="slds-m-top_small slds-grid slds-grid_vertical-align-center">
                        <lightning-icon icon-name="utility:call" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                        <span class={italicPhoneClass}>{displayPhone}</span>
                    </div>
                    <div class="slds-m-top_xx-small slds-grid slds-grid_vertical-align-center">
                        <lightning-icon icon-name="utility:email" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                        <span>{account.CA_Email__c}</span>
                    </div>
                </div>
            </div>
        </template>

        <template if:false={hasAccount}>
            <p class="slds-p-around_medium slds-text-color_weak">
                Nenhum proprietário relacionado ao imóvel do caso.
            </p>
        </template>
    </lightning-card>
</template>
